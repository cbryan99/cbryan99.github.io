name: Amazon Scraper Motor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        # Trocamos requests normal pela versão com Spoofing TLS
        run: pip install curl_cffi

      - name: Rodar Scraper
        run: python scraper.py

      - name: Commit e Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [ -f deals.json ]; then
            git add deals.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Auto] Preços/Ofertas atualizados" && git push)
          else
            echo "⚠️ deals.json não encontrado. A Amazon bloqueou a requisição (Erro 503) ou não houve dados."
          fi
