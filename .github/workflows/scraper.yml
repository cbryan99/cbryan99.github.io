name: Amazon Scraper Motor

on:
  schedule:
    - cron: '*/10 * * * *' # Roda a cada 10 minutos
  workflow_dispatch: # Permite você rodar manualmente na aba Actions do GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar Scraper
        run: python scraper.py

      - name: Commit e Push (Se houver mudança)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Verifica se o arquivo existe antes de tentar commitar
          if [ -f deals.json ]; then
            git add deals.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Auto] Preços/Ofertas atualizados" && git push)
          else
            echo "⚠️ deals.json não encontrado. A Amazon bloqueou a requisição nesta rodada (Erro 503)."
          fi
