<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Gold Box Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen selection:bg-amber-500 selection:text-gray-900">

    <div class="container mx-auto px-2 py-4 sm:p-6">
        <div class="flex flex-col sm:flex-row justify-between items-center border-b border-gray-800 pb-4 mb-6 gap-3">
            <div class="text-center sm:text-left">
                <h1 class="text-xl sm:text-2xl font-extrabold text-amber-500 tracking-tight">Amazon Monitor</h1>
                <p class="text-[11px] text-gray-400 mt-0.5">Scraper via GitHub Actions</p>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
                <button id="btn-notification" class="hidden text-xs px-3 py-1.5 rounded bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700 transition-all">
                    🔔 Ativar Notificações
                </button>
                
                <div class="flex items-center gap-2 w-full sm:w-auto justify-between sm:justify-end">
                    <div class="flex flex-col items-end">
                        <span id="label-last-check" class="text-[10px] text-gray-500 font-mono">Último: Carregando...</span>
                        <span id="label-timer" class="text-[10px] text-amber-400 font-mono font-bold">Atualizando em: 10:00</span>
                    </div>
                    <button id="btn-refresh" class="bg-amber-500 hover:bg-amber-600 text-gray-950 font-bold px-3 py-1.5 rounded-md transition-all text-xs flex items-center gap-1">
                        <span id="spinner" class="hidden animate-spin h-3.5 w-3.5 border-2 border-gray-950 border-t-transparent rounded-full"></span>
                        Atualizar
                    </button>
                </div>
            </div>
        </div>

        <div id="grid-container" class="grid grid-cols-2 gap-2 sm:gap-4"></div>

        <div id="empty-state" class="hidden text-center py-16 bg-gray-800 rounded-xl border border-dashed border-gray-700">
            <p class="text-gray-400 text-sm">Nenhum match nos filtros ou aguardando dados...</p>
        </div>
    </div>

    <script>
        let appState = { data: [] };
        let knownAsins = new Set();
        const checkInterval = 600; 
        let secondsLeft = checkInterval;
        let countdownTimer = null;
        let isFetching = false;

        const gridContainer = document.getElementById('grid-container');
        const emptyState = document.getElementById('empty-state');
        const labelLastCheck = document.getElementById('label-last-check');
        const labelTimer = document.getElementById('label-timer');
        const btnRefresh = document.getElementById('btn-refresh');
        const spinner = document.getElementById('spinner');

        function triggerPushNotification(deal) {
            if (Notification.permission === 'granted') {
                new Notification("🚨 Nova Oferta Encontrada!", {
                    body: `${deal.title.substring(0, 50)}... R$ ${deal.current_price}`,
                    icon: deal.image || "https://www.amazon.com.br/favicon.ico",
                    tag: deal.asin
                });
            }
        }

        function renderDeals(deals) {
            if (!deals || deals.length === 0) {
                gridContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            const cardsHTML = deals.map(deal => {
                const discountBadge = deal.discount > 0 
                    ? `<span class="absolute top-1 right-1 bg-rose-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded shadow">-${Math.round(deal.discount)}%</span>` : '';
                
                const newBadge = deal.is_new 
                    ? `<span class="absolute top-1 left-1 bg-emerald-500 text-gray-900 text-[10px] font-extrabold px-1.5 py-0.5 rounded shadow animate-pulse border border-emerald-300">NOVO</span>` : '';
                    
                const originalPriceLine = deal.original_price !== 'N/A' 
                    ? `<span class="text-[10px] text-gray-500 line-through">R$ ${deal.original_price}</span>` : '';
                    
                const criteriaBadges = (deal.criteria || []).map(crit => `
                    <span class="bg-gray-700/60 text-gray-300 text-[9px] font-mono px-1.5 py-0.5 rounded border border-gray-650">${crit}</span>
                `).join('');

                const imageHTML = deal.image 
                    ? `<img src="${deal.image}" alt="Produto" class="max-h-full object-contain" referrerpolicy="no-referrer">`
                    : `<div class="text-gray-400 text-xs flex flex-col items-center gap-1"><span class="text-lg">🖼️</span><span>Sem imagem</span></div>`;

                const borderClass = deal.is_new ? "border-emerald-500/60 shadow-[0_0_10px_rgba(16,185,129,0.2)]" : "border-gray-700 hover:border-amber-500/40";

                return `
                    <div class="bg-gray-800 rounded-lg overflow-hidden border flex flex-col justify-between transition-all duration-200 ${borderClass}">
                        <div class="relative bg-white p-2 flex items-center justify-center h-32 sm:h-40">
                            ${imageHTML}
                            ${newBadge}
                            ${discountBadge}
                        </div>
                        <div class="p-3 flex-1 flex flex-col justify-between gap-2">
                            <div>
                                <div class="flex justify-between items-start gap-1">
                                    <span class="text-[9px] font-bold uppercase text-amber-400 block tracking-wide truncate">
                                        ${deal.badge || 'Oferta Ativa'}
                                    </span>
                                    <span class="text-[9px] font-bold uppercase text-fuchsia-400 block tracking-wide bg-gray-900/60 px-1 rounded truncate flex-shrink-0">
                                        ${deal.category || ''}
                                    </span>
                                </div>
                                <h2 class="text-xs font-medium text-gray-200 line-clamp-2 mt-0.5" title="${deal.title}">
                                    ${deal.title}
                                </h2>
                            </div>
                            <div>
                                <div class="flex flex-wrap items-baseline gap-1">
                                    <span class="text-sm font-bold text-emerald-400">R$ ${deal.current_price}</span>
                                    ${originalPriceLine}
                                </div>
                                <div class="mt-1.5 flex flex-wrap gap-1">
                                    ${criteriaBadges}
                                </div>
                            </div>
                        </div>
                        <div class="p-3 pt-0">
                            <a href="${deal.link}" target="_blank" class="w-full block text-center bg-gray-700 hover:bg-amber-500 hover:text-gray-950 text-gray-200 font-bold py-1.5 rounded text-xs transition-colors">
                                Ver na Amazon ↗
                            </a>
                        </div>
                    </div>
                `;
            }).join('');

            gridContainer.innerHTML = cardsHTML;
        }

        async function fetchUpdatedDeals() {
            if (isFetching) return;
            isFetching = true;
            spinner.classList.remove('hidden');
            btnRefresh.disabled = true;

            try {
                // Fetch diretamente do arquivo de persistência com cache busting
                const response = await fetch('deals.json?t=' + new Date().getTime());
                const newState = await response.json();
                
                if (newState && newState.data) {
                    let hasNewItems = false;
                    newState.data.forEach(deal => {
                        if (!knownAsins.has(deal.asin)) {
                            knownAsins.add(deal.asin);
                            hasNewItems = true;
                            if (appState.data && appState.data.length > 0) {
                                triggerPushNotification(deal);
                            }
                        }
                    });

                    appState = newState;
                    labelLastCheck.textContent = `Último: ${newState.last_check}`;
                    renderDeals(newState.data);
                }
            } catch (err) {
                console.error("Falha ao puxar JSON:", err);
            } finally {
                isFetching = false;
                spinner.classList.add('hidden');
                btnRefresh.disabled = false;
                resetTimer();
            }
        }

        function startTimer() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                secondsLeft--;
                if (secondsLeft <= 0) {
                    fetchUpdatedDeals();
                } else {
                    const mins = Math.floor(secondsLeft / 60);
                    const secs = secondsLeft % 60;
                    labelTimer.textContent = `Atualizando em: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function resetTimer() {
            secondsLeft = checkInterval;
            startTimer();
        }

        btnRefresh.addEventListener('click', () => {
            fetchUpdatedDeals();
        });

        window.onload = () => {
            if ("Notification" in window && Notification.permission === 'default') {
                const btnNotif = document.getElementById('btn-notification');
                btnNotif.classList.remove('hidden');
                btnNotif.addEventListener('click', async () => {
                    const perm = await Notification.requestPermission();
                    if (perm === 'granted') btnNotif.classList.add('hidden');
                });
            }
            // Chama imediatamente no load
            fetchUpdatedDeals();
        };
    </script>
</body>
</html>
